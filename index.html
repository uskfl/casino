<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>67Casino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="glass-panel">
        <div class="logo">67Casino</div>
        <nav>
            <button class="nav-btn active" data-target="lobby-screen">Лобби</button>
            <button class="nav-btn" data-target="crash-screen">Crash</button>
            <button class="nav-btn" data-target="roulette-screen">Roulette</button>
            <button class="nav-btn hidden" id="nav-admin" data-target="admin-screen">Admin</button>
        </nav>
        <div class="profile-widget hidden" id="user-profile">
            <div class="avatar"></div>
            <div class="info">
                <span id="user-email" class="nickname">Loading...</span>
                <span class="balance"><span id="balance-amount" class="odometer">0</span> $</span>
            </div>
            <button id="logout-btn" class="icon-btn">🚪</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <!-- Lobby Screen -->
        <section id="lobby-screen" class="screen active">
            <div class="hero glass-card">
                <h1>Welcome to 67Casino</h1>
                <p>Элитный гемблинг нового поколения</p>
                <div class="hero-actions">
                    <button class="btn-primary" id="daily-case-btn">Ежедневный кейс</button>
                    <button class="btn-secondary" id="promo-btn">Промокод</button>
                </div>
            </div>
            <div class="game-grid">
                <div class="game-card glass-card" onclick="app.switchScreen('crash-screen')">
                    <div class="game-img crash-img">📈</div>
                    <h3>Crash</h3>
                </div>
                <div class="game-card glass-card" onclick="app.switchScreen('roulette-screen')">
                    <div class="game-img roulette-img">🎡</div>
                    <h3>Roulette</h3>
                </div>
            </div>
        </section>

        <!-- Crash Screen -->
        <section id="crash-screen" class="screen hidden">
            <div class="game-container glass-card">
                <div class="canvas-wrapper">
                    <canvas id="crash-canvas"></canvas>
                    <div id="crash-multiplier">1.00x</div>
                </div>
                <div class="controls">
                    <input type="number" id="crash-bet" placeholder="Сумма ставки" value="10">
                    <button class="btn-primary w-100" id="crash-action-btn">Поставить</button>
                </div>
            </div>
        </section>

        <!-- Roulette Screen -->
        <section id="roulette-screen" class="screen hidden">
            <div class="game-container glass-card">
                <div class="roulette-wrapper">
                    <div class="selector-line"></div>
                    <div class="roulette-tape" id="roulette-tape"></div>
                </div>
                <div class="controls roulette-controls">
                    <input type="number" id="roulette-bet" placeholder="Ставка" value="10">
                    <div class="color-bets">
                        <button class="btn-bet btn-gray" data-color="gray">2x</button>
                        <button class="btn-bet btn-green" data-color="green">14x</button>
                        <button class="btn-bet btn-dark" data-color="dark">2x</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Admin Screen -->
        <section id="admin-screen" class="screen hidden">
            <div class="admin-container glass-card">
                <h2>Панель управления</h2>
                <div class="admin-stats">
                    <div class="stat-box">Экономика сервера: <span id="total-server-money" class="text-green">0 $</span></div>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>UID / Email</th>
                            <th>Баланс</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="admin-users-list">
                        <!-- Динамический контент -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content glass-card">
            <h2>Авторизация</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <button class="btn-primary w-100" id="login-btn">Войти / Регистрация</button>
        </div>
    </div>

    <!-- Promo Modal -->
    <div id="promo-modal" class="modal-overlay hidden">
        <div class="modal-content glass-card">
            <h2>Активация кода</h2>
            <input type="text" id="promo-input" placeholder="Введите код">
            <button class="btn-primary w-100" id="activate-promo-btn">Активировать</button>
            <button class="btn-secondary w-100 mt-2" onclick="app.closeModal('promo-modal')">Закрыть</button>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
    <script type="module" src="firebase-logic.js"></script>
</body>
</html>
